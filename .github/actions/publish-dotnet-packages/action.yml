name: 'Publish .NET packages to NuGet'
description: 'Collects .nupkg and .snupkg files and publishes all packages to NuGet.org using the supplied API key. Outputs the list of package files for use in a subsequent GitHub release step.'

inputs:
  nuget_api_key:
    description: 'NuGet API key obtained via OIDC login in the calling workflow.'
    required: true

outputs:
  package_files:
    description: 'Newline-separated list of all .nupkg and .snupkg file paths that were published.'
    value: ${{ steps.collect.outputs.package_files }}

runs:
  using: composite
  steps:
    - name: Collect package files
      id: collect
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        Write-Host "🔍 Searching for .nupkg and .snupkg files..."
        $packages = Get-ChildItem -Path . -Recurse -File |
          Where-Object { ($_.Extension -eq '.nupkg' -or $_.Extension -eq '.snupkg') -and $_.Name -notlike '*.symbols.nupkg' }

        if (-not $packages) {
          throw "❌ No .nupkg files were produced. Did the build run with GeneratePackageOnBuild=true?"
        }

        Write-Host "📦 Found $($packages.Count) package file(s):"
        $packages | ForEach-Object { Write-Host "   • $($_.Name)" }

        $pkgFilesJoined = ($packages | ForEach-Object { $_.FullName }) -join "`n"

        "package_files<<EOF" >> $env:GITHUB_OUTPUT
        $pkgFilesJoined      >> $env:GITHUB_OUTPUT
        "EOF"                >> $env:GITHUB_OUTPUT

    - name: Publish packages to NuGet
      if: ${{ inputs.nuget_api_key != '' }}
      shell: pwsh
      env:
        NUGET_API_KEY: ${{ inputs.nuget_api_key }}
      run: |
        $ErrorActionPreference = 'Stop'

        $pkgs = Get-ChildItem -Path . -Recurse -File -Filter *.nupkg |
          Where-Object { $_.Name -notlike '*.symbols.nupkg' }

        if (-not $pkgs) {
          throw "❌ No .nupkg files found to publish."
        }

        Write-Host "🚀 Publishing $($pkgs.Count) package(s) to NuGet.org..."
        foreach ($pkg in $pkgs) {
          Write-Host "   📤 Pushing $($pkg.Name)"
          dotnet nuget push "$($pkg.FullName)" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
        }

        $snupkgs = Get-ChildItem -Path . -Recurse -File -Filter *.snupkg
        if ($snupkgs) {
          Write-Host "🔣 Publishing $($snupkgs.Count) symbol package(s)..."
          foreach ($snupkg in $snupkgs) {
            Write-Host "   📤 Pushing $($snupkg.Name)"
            dotnet nuget push "$($snupkg.FullName)" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
        }
        Write-Host "✅ All packages published successfully."
