name: .NET Build, Test, Pack and Publish  to NuGet

# Reusable workflow. The calling workflow performs the NuGet OIDC login itself
# (so the OIDC token is issued for the caller's repository), encrypts the
# short-lived API key with the encrypt-value action, and passes the ciphertext
# in. This reusable workflow decrypts it just before publishing. Encrypting the
# key is necessary because GitHub masks raw secret values to '' when they cross
# job / reusable-workflow boundaries.
#
#   jobs:
#     login:
#       runs-on: ubuntu-latest
#       permissions:
#         id-token: write
#       outputs:
#         encrypted_api_key: ${{ steps.encrypt.outputs.encrypted }}
#       steps:
#         - id: login
#           uses: NuGet/login@v1
#           with: { user: ${{ secrets.NUGET_USER }} }
#         - id: encrypt
#           uses: wertzui/Actions/.github/actions/encrypt-value@main
#           with:
#             value: ${{ steps.login.outputs.NUGET_API_KEY }}
#             key: ${{ secrets.ENCRYPTION_KEY }}
#
#     release:
#       needs: login
#       permissions:
#         contents: write
#       uses: wertzui/Actions/.github/workflows/nuget-build.yml@main
#       with:
#         solution_file: MySolution.slnx   # or .sln
#         encrypted_api_key: ${{ needs.login.outputs.encrypted_api_key }}
#       secrets:
#         encryption_key: ${{ secrets.ENCRYPTION_KEY }}

on:
  workflow_call:
    inputs:
      solution_file:
        description: 'Path to the .sln or .slnx solution file.'
        required: true
        type: string
      dotnet_version:
        description: '.NET SDK version to set up.'
        required: false
        default: '10.0.x'
        type: string
      filter:
        description: 'dotnet-version filter expression to select packaged projects (e.g. "GeneratePackageOnBuild=true").'
        required: false
        default: 'GeneratePackageOnBuild=true'
        type: string
      tool_version:
        description: 'Version of DotnetVersionReader to install from NuGet.org. Leave empty for the latest stable.'
        required: false
        default: ''
        type: string
      base:
        description: 'Git ref (tag, branch, or SHA) to compare versions against for the version-bump check.'
        required: false
        default: 'main'
        type: string
      encrypted_api_key:
        description: 'AES-256-GCM encrypted NuGet API key (Base64) produced by the encrypt-value action in the calling workflow.'
        required: false
        default: ''
        type: string
    secrets:
      encryption_key:
        description: 'Passphrase used to decrypt encrypted_api_key (must match the one used to encrypt).'
        required: false

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ inputs.solution_file }}"

      - name: Build
        shell: pwsh
        run: dotnet build "${{ inputs.solution_file }}" -c Release --no-restore

      - name: Install dotnet-version
        uses: wertzui/Actions/.github/actions/install-dotnet-version@main
        with:
          version: ${{ inputs.tool_version }}

      - name: Test
        shell: pwsh
        run: dotnet test "${{ inputs.solution_file }}" -c Release --no-build

      - name: Check version bumps against previous release tag
        uses: wertzui/Actions/.github/actions/check-dotnet-version@main
        with:
          input: ${{ inputs.solution_file }}
          base: ${{ inputs.base }}
          filter: ${{ inputs.filter }}

      - name: Read version metadata
        id: read-versions
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: wertzui/Actions/.github/actions/read-dotnet-version@main
        with:
          input: ${{ inputs.solution_file }}
          filter: ${{ inputs.filter }}
          create_tags: 'true'

      - name: Decrypt NuGet API key
        id: decrypt
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: wertzui/Actions/.github/actions/decrypt-value@main
        with:
          encrypted: ${{ inputs.encrypted_api_key }}
          key: ${{ secrets.encryption_key }}

      - name: Publish packages to NuGet
        id: publish
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: wertzui/Actions/.github/actions/publish-dotnet-packages@main
        with:
          nuget_api_key: ${{ steps.decrypt.outputs.decrypted }}

      - name: Create GitHub release and upload nupkg files
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.read-versions.outputs.release_tag }}
          name: ${{ steps.read-versions.outputs.release_name }}
          body: ${{ steps.read-versions.outputs.release_body }}
          files: ${{ steps.publish.outputs.package_files }}
